name: Deploy site

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-east-1
  S3_BUCKET: hickoryhilllfl.com
  DEPLOY_ROLE: arn:aws:iam::205074708100:role/hickoryhilllfl-github-deploy

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync site to S3
        run: |
          aws s3 sync . "s3://${S3_BUCKET}/" \
            --delete \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "*.md" \
            --exclude ".gitignore" \
            --cache-control "public, max-age=300"

      - name: Ensure index.html content-type
        run: |
          aws s3 cp "s3://${S3_BUCKET}/index.html" "s3://${S3_BUCKET}/index.html" \
            --metadata-directive REPLACE \
            --content-type "text/html; charset=utf-8" \
            --cache-control "public, max-age=300"

      - name: Invalidate CloudFront cache
        env:
          DIST_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          if [ -z "$DIST_ID" ]; then
            echo "CLOUDFRONT_DISTRIBUTION_ID variable is not set yet; skipping invalidation."
            exit 0
          fi
          aws cloudfront create-invalidation \
            --distribution-id "$DIST_ID" \
            --paths "/*"
